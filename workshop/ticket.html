<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Your Ticket — Prime Event</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #d4a574;
      --bg: #f8f6f2;
      --text: #2c2824;
      --muted: #8c857e;
      --border: #e5e0d9;
      --light: #b0a89f;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      min-height: 100svh;
      padding: 24px 16px;
    }

    .ticket {
      width: 100%;
      max-width: 400px;
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .ticket-top {
      background: var(--text);
      padding: 28px 24px 20px;
      text-align: center;
      position: relative;
    }
    .ticket-top::after {
      content: '';
      position: absolute;
      bottom: -12px;
      left: 0;
      right: 0;
      height: 24px;
      background: radial-gradient(circle at 12px 0, var(--bg) 12px, transparent 13px);
      background-size: 24px 24px;
    }
    .ticket-top .brand { color: var(--brand); font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }
    .ticket-top .title { color: #ffffff; font-size: 20px; font-weight: 800; margin-top: 4px; }
    .ticket-top .date { color: var(--muted); font-size: 13px; margin-top: 6px; }

    .ticket-body {
      padding: 28px 24px 20px;
      text-align: center;
    }
    .ticket-body .label { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
    .ticket-body .name { color: var(--text); font-size: 26px; font-weight: 900; line-height: 1.15; }

    .tier-badge {
      display: inline-block;
      background: color-mix(in srgb, var(--brand) 12%, transparent);
      color: var(--brand);
      font-size: 14px;
      font-weight: 700;
      padding: 6px 18px;
      border-radius: 999px;
      margin-top: 12px;
    }
    .tier-badge .qty { color: var(--muted); font-weight: 500; }

    .divider-dashed {
      margin: 20px 0;
      border: none;
      height: 1px;
      background: repeating-linear-gradient(to right, var(--border) 0, var(--border) 8px, transparent 8px, transparent 16px);
    }

    .code-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 4px;
    }
    .code-section .code-label { color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
    .code-section .code-value {
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 2px;
    }

    .ticket-footer {
      padding: 0 24px 24px;
      text-align: center;
    }
    .ticket-footer p { color: var(--light); font-size: 11px; line-height: 1.5; }

    .back-link {
      margin-top: 32px;
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    .error-state {
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
    }
    .error-state h2 { color: var(--text); font-size: 20px; font-weight: 700; margin-bottom: 8px; }

    .print-btn {
      margin-top: 24px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      max-width: 400px;
      transition: filter 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .print-btn:hover { filter: brightness(0.92); }
    .print-btn:active { transform: scale(0.97); }

    @media (max-width: 380px) {
      .ticket-top { padding: 24px 20px 16px; }
      .ticket-top .title { font-size: 17px; }
      .ticket-body { padding: 24px 20px 16px; }
      .ticket-body .name { font-size: 22px; }
      .tier-badge { font-size: 13px; padding: 5px 14px; }
      .code-section .code-value { font-size: 16px; }
    }

    @media print {
      body { background: #fff; padding: 0; min-height: auto; justify-content: flex-start; }
      .print-btn, .back-link { display: none !important; }
      .ticket { box-shadow: none; border: 1px solid var(--border); border-radius: 12px; }
      .ticket-top { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .ticket-top::after { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .tier-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

  <div class="ticket" id="ticket">
    <div class="ticket-top">
      <div class="brand">Prime Event</div>
      <h1 class="title" id="ticket-title">Your Event Registration</h1>
      <p class="date">Your digital pass</p>
    </div>

    <div class="ticket-body" id="ticket-body">
      <p class="label">Attendee</p>
      <p class="name" id="attendee-name">—</p>

      <div class="tier-badge" id="tier-badge">
        <span id="tier-name">—</span>
        <span class="qty" id="tier-qty"></span>
      </div>

      <hr class="divider-dashed">

      <div class="code-section">
        <span class="code-label">Confirmation</span>
        <span class="code-value" id="conf-code">—</span>
      </div>
    </div>

    <div class="ticket-footer">
      <p>Present this at the door on event day.<br>A confirmation copy has been sent to your email.</p>
    </div>
  </div>

  <button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>

  <a class="back-link" href="index.html">← Register another</a>

  <script>
    // ═══════════════════════════════════════════════════════════════════════════
    //  EDIT THESE to match your event
    // ═══════════════════════════════════════════════════════════════════════════
    const CONFIG = {
      eventName: 'Your Event',
      brand: '#d4a574',
      bg: '#f8f6f2',
      text: '#2c2824',
      muted: '#8c857e',
      border: '#e5e0d9',
      light: '#b0a89f',
    };
    // ═══════════════════════════════════════════════════════════════════════════

    const r = document.documentElement.style;
    r.setProperty('--brand', CONFIG.brand);
    r.setProperty('--bg', CONFIG.bg);
    r.setProperty('--text', CONFIG.text);
    r.setProperty('--muted', CONFIG.muted);
    r.setProperty('--border', CONFIG.border);
    r.setProperty('--light', CONFIG.light);
    document.title = 'Your Ticket — ' + CONFIG.eventName;
    document.querySelector('.brand').textContent = CONFIG.eventName;
    document.getElementById('ticket-title').textContent = CONFIG.eventName + ' Registration';

    (function() {
      const p = new URLSearchParams(window.location.search);
      const name = p.get('name');
      const tier = p.get('tier');
      const qty = p.get('qty');
      const code = p.get('code');

      if (name) document.getElementById('attendee-name').textContent = name;
      if (tier) document.getElementById('tier-name').textContent = tier;
      if (qty && parseInt(qty) > 1) document.getElementById('tier-qty').textContent = 'x' + qty;
      if (code) document.getElementById('conf-code').textContent = code;

      if (!name && !code) {
        document.getElementById('ticket').innerHTML =
          '<div class="error-state"><h2>Ticket not found</h2><p>No ticket details provided. Check your link or contact the organizer.</p></div>';
      }
    })();
  </script>

</body>
</html>
