<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Know Nation — Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #d4a574; --bg: #f8f6f2; --text: #2c2824; --muted: #8c857e; --border: #e5e0d9; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      min-height: 100dvh; padding: 48px 20px;
    }
    .container { width: 100%; max-width: 480px; }
    .brand { color: var(--brand); font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; }
    h1 { font-size: 26px; font-weight: 800; color: var(--text); margin-top: 4px; }
    .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .list { margin-top: 32px; display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px;
      text-decoration: none; display: block; transition: all 0.2s;
    }
    .card:hover { border-color: var(--brand); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
    .card:active { transform: scale(0.98); }
    .card h2 { font-size: 17px; font-weight: 700; color: var(--text); }
    .card p { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .card .url { font-size: 12px; color: var(--brand); font-weight: 500; margin-top: 8px; }
    #footer { margin-top: 48px; opacity: 0.1; user-select: none; pointer-events: none; text-align: center; }
    #footer span { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">Know Nation</div>
    <h1>Projects</h1>
    <p class="sub">Select a project to open</p>
    <div class="list">
      <a class="card" href="workshop/">
        <h2>Workshop Registration</h2>
        <p>3-step registration form with WhatsApp DM delivery</p>
        <div class="url">/workshop</div>
      </a>
      <a class="card" href="fitness/">
        <h2>Fitness Form</h2>
        <p>Workout registration and enquiry form</p>
        <div class="url">/fitness</div>
      </a>
    </div>
  </div>
  <div id="footer"><span>Project by Know Nation Limited</span></div>
</body>
</html>
