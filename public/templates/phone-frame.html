<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Know Nation — [Project Name]</title>
  <meta name="description" content="[Description for SEO]">
  <meta property="og:title" content="[OG Title]">
  <meta property="og:description" content="[OG Description]">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:#fafafa}
    ::-webkit-scrollbar-thumb{background:#e5e7eb;border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:#0891B2}
    :root{--brand:#0891B2;--brand-dark:#066F8A;--bg:#fafafa;--text:#0c0a09;--muted:#6b7280;--border:#e5e7eb;--card:#fff;--error:#e11d48;--success:#16a34a}
    body{
      font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
      display:flex;flex-direction:column;align-items:center;min-height:100dvh;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;padding:20px 16px 40px
    }

    /* ─── Device Selector ─── */
    .device-selector {
      display:flex;justify-content:center;gap:4px;margin:0 auto 12px;
      background:var(--border);padding:3px;border-radius:99px;width:fit-content;
    }
    .device-selector button {
      padding:6px 16px;border:none;border-radius:99px;
      font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;
      background:transparent;color:var(--muted);transition:all .2s;font-family:inherit;
    }
    .device-selector button.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

    /* ─── Phone Frame ─── */
    .phone-frame{transition:all .35s ease;width:100%;position:relative}

    .phone-frame.device-phone {
      background: var(--fb,#0a0a0a);border-radius:55px;padding:0 6px;
      max-width:393px;height: min(844px, calc(100dvh - 130px));margin:0 auto;overflow:hidden;flex-shrink:0;
      display:flex;flex-direction:column;
      box-shadow:0 0 0 1px var(--fo,rgba(255,255,255,.1)),0 0 0 3px var(--fb,#1a1a1a),0 30px 80px rgba(0,0,0,.4);
    }
    .phone-frame.device-phone .frame-buttons{position:absolute;inset:0;pointer-events:none;z-index:1}
    .phone-frame.device-phone .frame-buttons .left{position:absolute;left:-3px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;align-items:flex-end}
    .phone-frame.device-phone .frame-buttons .left div{width:3px;background:var(--fb,#0a0a0a);border-radius:0 2px 2px 0}
    .phone-frame.device-phone .frame-buttons .left .vol-up{height:36px}
    .phone-frame.device-phone .frame-buttons .left .vol-down{height:36px}
    .phone-frame.device-phone .frame-buttons .left .action-btn{height:22px;margin-top:6px}
    .phone-frame.device-phone .frame-buttons .right{position:absolute;right:-3px;top:50%;transform:translateY(-50%)}
    .phone-frame.device-phone .frame-buttons .right div{width:3px;height:56px;background:var(--fb,#0a0a0a);border-radius:2px 0 0 2px}
    .phone-frame.device-phone #app {
      background:var(--bg);max-width:none;width:100%;flex:1;
      overflow-y:auto;overflow-x:hidden;
      -webkit-overflow-scrolling:touch;padding:0 16px 32px;position:relative;
    }
    .phone-frame.device-phone #app::-webkit-scrollbar{width:3px}
    .phone-frame.device-phone #app::-webkit-scrollbar-track{background:transparent}
    .phone-frame.device-phone #app::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
    .phone-frame.device-phone .frame-notch,
    .phone-frame.device-phone .frame-home-bar{display:flex;justify-content:center;align-items:center;padding:10px 0;flex-shrink:0}
    .phone-frame.device-phone .status-bar{display:flex;height:44px;padding:0 16px;flex-shrink:0;background:#0c0a09;color:#e7e5e4}

    .phone-frame.device-tablet {
      background:var(--fb,#0a0a0a);border-radius:24px;padding:0;
      max-width:640px;min-height:640px;height:auto;margin:0 auto;overflow:hidden;
      display:flex;flex-direction:column;
      box-shadow:0 0 0 1px var(--fo,rgba(255,255,255,.08)),0 15px 50px rgba(0,0,0,.15);
    }
    .phone-frame.device-tablet #app{background:var(--bg);max-width:none;width:100%;flex:1;overflow-y:auto;overflow-x:hidden;padding:0 24px 28px;position:relative}
    .phone-frame.device-tablet .status-bar{display:flex;height:44px;padding:0 24px;flex-shrink:0;background:var(--bg)}

    .phone-frame.device-desktop{background:transparent;border-radius:0;padding:0;max-width:none;height:auto;margin:0 auto;display:block;box-shadow:none}
    .phone-frame.device-desktop #app{background:transparent;max-width:480px;width:100%;margin:0 auto;padding:0;overflow:visible;border-radius:0}

    .phone-frame:not(.device-phone) .frame-notch,
    .phone-frame:not(.device-phone) .frame-home-bar,
    .phone-frame:not(.device-phone) .frame-buttons{display:none}
    .phone-frame:not(.device-phone):not(.device-tablet) .status-bar{display:none}

    .dynamic-island{width:110px;height:30px;background:#000;border-radius:15px}
    .status-bar{display:flex;align-items:center;justify-content:space-between;height:44px;padding:0;font-size:12px;font-weight:700;flex-shrink:0;color:var(--text)}
    .status-bar .sb-left{display:flex;align-items:center;gap:4px}
    .status-bar .sb-center{font-size:10px;font-weight:600;letter-spacing:.5px;opacity:.5}
    .status-bar .sb-right{display:flex;align-items:center;gap:5px}
    .status-bar .sb-right svg{display:block}
    .home-indicator{width:132px;height:5px;background:var(--hi,rgba(255,255,255,.85));border-radius:99px}

    /* ─── Page Nav ─── */
    .page-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;font-size:13px;font-weight:500}
    .page-nav a{display:inline-flex;align-items:center;gap:4px;color:var(--muted);text-decoration:none;transition:color .2s}
    .page-nav a:hover{color:var(--brand)}
    .page-nav a svg{width:14px;height:14px}
    .page-nav .nav-home{margin-right:4px}
    .page-nav .nav-current{color:var(--text);font-weight:600}
    .page-nav .disabled{opacity:.2}

    /* ─── Footer ─── */
    .footer-text{text-align:center;font-size:11px;color:var(--muted);margin-top:20px;padding-bottom:8px}
    @media(max-height:700px){body{padding:12px}.device-selector{margin-bottom:8px}.device-selector button{padding:4px 12px;font-size:11px}.page-nav{font-size:12px;margin-bottom:4px}.footer-text{margin-top:12px}}
    @media(max-height:600px){.device-selector,.page-nav,.footer-text{display:none}body{padding:8px}}

    /* ════════════════════════════════════════════════
       YOUR FORM STYLES GO BELOW
       ════════════════════════════════════════════════ */
  </style>
</head>
<body>

  <div class="device-selector">
    <button data-device="phone" class="active"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> Phone</button>
    <button data-device="tablet"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg> Tablet</button>
    <button data-device="desktop"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> Desktop</button>
  </div>

  <div class="page-nav">
    <a href="../" class="nav-home" title="Home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v9a1 1 0 0 0 1 1h3v-5h6v5h3a1 1 0 0 0 1-1v-9"/></svg>
    </a>
    <a href="../[previous-page]/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Prev
    </a>
    <span class="nav-current">[Page Name]</span>
    <span class="disabled"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
  </div>

  <div class="phone-frame device-phone" id="phone-frame">
    <div class="frame-buttons">
      <div class="left"><div class="vol-up"></div><div class="vol-down"></div><div class="action-btn"></div></div>
      <div class="right"><div></div></div>
    </div>

    <div class="frame-notch"><div class="dynamic-island"></div></div>

    <div class="status-bar">
      <div class="sb-left">9:41</div>
      <div class="sb-center">KnowNationHQ</div>
      <div class="sb-right">
        <svg width="16" height="12" viewBox="0 0 18 12"><rect x="0" y="8" width="3" height="4" rx="0.6" fill="currentColor"/><rect x="5" y="5" width="3" height="7" rx="0.6" fill="currentColor"/><rect x="10" y="2.5" width="3" height="9.5" rx="0.6" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="0.6" fill="currentColor" opacity="0.35"/></svg>
        <svg width="14" height="12" viewBox="0 0 16 12"><path d="M1 4.5a14 14 0 0 1 14 0" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"/><path d="M4 7.5a8 8 0 0 1 8 0" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="10.5" r="1.2" fill="currentColor"/></svg>
        <svg width="22" height="12" viewBox="0 0 26 12"><rect x="0.5" y="0.5" width="20" height="11" rx="2" stroke="currentColor" fill="none" stroke-width="1"/><rect x="22" y="3.5" width="3" height="5" rx="1" fill="currentColor" opacity="0.4"/><rect x="2.5" y="2.5" width="16" height="7" rx="1" fill="currentColor"/></svg>
      </div>
    </div>

    <!-- ════════════════════════════════════════════════
         YOUR FORM/PAGE CONTENT GOES INSIDE #app
         ════════════════════════════════════════════════ -->
    <div id="app">

      <!-- 👇 DROP YOUR CONTENT HERE 👇 -->

      <div style="padding-top:24px;text-align:center;color:var(--muted)">
        <p style="font-size:14px">Your content goes here</p>
      </div>

      <!-- 👆 /YOUR CONTENT 👆 -->

      <div class="frame-home-bar"><div class="home-indicator"></div></div>
    </div>
  </div>

  <p class="footer-text">Project by Know Nation Limited</p>

  <script>
    (function() {
      /* ─── Device Selector ─── */
      const frame = document.getElementById('phone-frame');
      document.querySelectorAll('.device-selector button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelector('.device-selector .active').classList.remove('active');
          btn.classList.add('active');
          frame.className = 'phone-frame device-' + btn.dataset.device;
        });
      });

      /* ─── YOUR FORM JS GOES BELOW ─── */
    })();
  </script>
</body>
</html>
